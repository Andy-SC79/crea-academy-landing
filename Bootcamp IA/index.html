<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bootcamp IA · Ingeniería 365</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0A2540;
    --cyan: #00C2FF;
    --purple: #6C63FF;
    --bg: #F8FAFC;
    --text: #1A1A1A;
    --text-muted: #64748b;
    --border: rgba(10,37,64,0.1);
    --card-bg: #ffffff;
    --grad: linear-gradient(135deg, var(--navy) 0%, #0d3460 40%, #1a1a5e 100%);
    --grad-accent: linear-gradient(135deg, var(--cyan), var(--purple));
    --radius: 16px;
    --radius-sm: 10px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 18px 5%;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(248,250,252,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s;
  }
  nav.scrolled { background: rgba(248,250,252,0.97); box-shadow: 0 2px 20px rgba(10,37,64,0.08); }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-mark {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--grad);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 14px; color: white; letter-spacing: -0.5px;
  }
  .nav-logo-text { font-weight: 700; font-size: 15px; color: var(--navy); letter-spacing: -0.3px; }
  .nav-logo-text span { color: var(--cyan); }
  .nav-links { display: flex; align-items: center; gap: 28px; }
  .nav-links a { text-decoration: none; font-size: 14px; font-weight: 500; color: var(--text-muted); transition: color 0.2s; }
  .nav-links a:hover { color: var(--navy); }
  .nav-cta {
    background: var(--navy); color: white;
    padding: 10px 22px; border-radius: 50px;
    font-size: 14px; font-weight: 600; text-decoration: none;
    transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(10,37,64,0.25);
  }
  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(10,37,64,0.35); }

  /* HERO */
  .hero {
    min-height: 100vh;
    background: var(--grad);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center;
    padding: 120px 5% 80px;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 70% 50%, rgba(0,194,255,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(108,99,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse at center, black 30%, transparent 75%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; width: 100%; }
  .hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    padding: 7px 16px; border-radius: 50px;
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.85);
    margin-bottom: 24px; backdrop-filter: blur(10px);
  }
  .hero-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; flex-shrink: 0; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.3); } }
  
  .hero h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(36px, 4.5vw, 58px);
    font-weight: 700;
    color: white;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }
  .hero h1 .gradient-text {
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-sub {
    font-size: clamp(16px, 1.8vw, 19px); color: rgba(255,255,255,0.7);
    margin-bottom: 36px; line-height: 1.6; font-weight: 400;
    max-width: 480px;
  }
  .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 36px; }
  .btn-primary {
    background: linear-gradient(135deg, var(--cyan), #0099dd);
    color: white; padding: 16px 32px; border-radius: 50px;
    font-size: 15px; font-weight: 700; border: none; cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(0,194,255,0.4), 0 0 0 0 rgba(0,194,255,0);
    letter-spacing: -0.2px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,194,255,0.5), 0 0 40px rgba(0,194,255,0.15); }
  .btn-secondary {
    background: rgba(255,255,255,0.08); color: white;
    padding: 16px 28px; border-radius: 50px;
    font-size: 15px; font-weight: 600; border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; transition: all 0.25s; backdrop-filter: blur(10px);
    letter-spacing: -0.2px;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }

  .hero-cities {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .city-pill {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
    padding: 6px 14px; border-radius: 50px;
    font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.65);
    cursor: pointer; transition: all 0.2s;
  }
  .city-pill:hover, .city-pill.active {
    background: rgba(0,194,255,0.15); border-color: rgba(0,194,255,0.4);
    color: var(--cyan);
  }

  /* Seats counter */
  .seats-widget {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius); padding: 20px 24px;
    backdrop-filter: blur(15px); margin-bottom: 32px;
  }
  .seats-label { font-size: 12px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .seats-bar-wrap { background: rgba(255,255,255,0.08); border-radius: 50px; height: 8px; margin-bottom: 10px; overflow: hidden; }
  .seats-bar { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 50px; transition: width 0.8s ease; }
  .seats-info { display: flex; justify-content: space-between; }
  .seats-used { font-size: 13px; font-weight: 600; color: white; }
  .seats-total { font-size: 13px; color: rgba(255,255,255,0.5); }
  .seats-urgent { font-size: 12px; color: #ff6b6b; font-weight: 600; margin-top: 4px; }

  /* Hero visual */
  .hero-visual {
    position: relative; display: flex; align-items: center; justify-content: center;
  }
  .hero-mockup {
    width: 100%; max-width: 460px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 28px;
    backdrop-filter: blur(20px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .mockup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .mockup-dots { display: flex; gap: 6px; }
  .mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
  .mockup-title { font-size: 13px; color: rgba(255,255,255,0.4); flex: 1; text-align: center; }
  .mockup-screen {
    background: linear-gradient(145deg, #0d1b35, #111840);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .mockup-prompt-label { font-size: 10px; color: var(--cyan); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
  .mockup-prompt { font-size: 13px; color: rgba(255,255,255,0.75); line-height: 1.6; font-family: 'Space Grotesk', monospace; }
  .mockup-prompt .cursor { display: inline-block; width: 2px; height: 14px; background: var(--cyan); margin-left: 2px; animation: blink 1.2s step-end infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }
  .mockup-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .mockup-metric {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 14px;
  }
  .metric-val { font-size: 22px; font-weight: 700; color: white; font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.5px; }
  .metric-val.cyan { color: var(--cyan); }
  .metric-val.purple { color: #a78bfa; }
  .metric-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .float-tag {
    position: absolute; background: white; border-radius: 12px;
    padding: 10px 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    font-size: 12px; font-weight: 600; color: var(--navy);
    display: flex; align-items: center; gap: 8px;
    animation: float 4s ease-in-out infinite;
  }
  .float-tag.tag-1 { top: -20px; right: -20px; animation-delay: 0s; }
  .float-tag.tag-2 { bottom: 20px; left: -30px; animation-delay: 2s; }
  .float-icon { font-size: 16px; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* SECTIONS */
  section { padding: 100px 5%; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-tag {
    display: inline-block;
    background: linear-gradient(135deg, rgba(0,194,255,0.1), rgba(108,99,255,0.1));
    border: 1px solid rgba(108,99,255,0.2);
    color: var(--purple); font-size: 12px; font-weight: 700;
    padding: 5px 14px; border-radius: 50px; letter-spacing: 1px;
    text-transform: uppercase; margin-bottom: 16px;
  }
  h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 700; letter-spacing: -1.5px;
    color: var(--navy); line-height: 1.15;
    margin-bottom: 16px;
  }
  h2 .accent { background: linear-gradient(135deg, var(--cyan), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .section-sub { font-size: 18px; color: var(--text-muted); max-width: 560px; line-height: 1.6; margin-bottom: 56px; }

  /* PROBLEM */
  .problem-section { background: var(--navy); }
  .problem-section h2 { color: white; }
  .problem-section .section-sub { color: rgba(255,255,255,0.55); }
  .problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
  .problem-bullets { display: flex; flex-direction: column; gap: 20px; }
  .problem-bullet {
    display: flex; align-items: flex-start; gap: 18px;
    padding: 22px 24px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius); transition: all 0.25s;
  }
  .problem-bullet:hover { background: rgba(255,255,255,0.07); transform: translateX(4px); }
  .problem-icon-wrap {
    width: 44px; height: 44px; border-radius: 10px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    background: rgba(255,94,94,0.15); border: 1px solid rgba(255,94,94,0.2);
  }
  .problem-text h3 { font-size: 16px; font-weight: 600; color: white; margin-bottom: 4px; }
  .problem-text p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.5; }
  .problem-cta-box {
    background: linear-gradient(135deg, rgba(0,194,255,0.1), rgba(108,99,255,0.1));
    border: 1px solid rgba(108,99,255,0.25); border-radius: 24px;
    padding: 40px; text-align: center;
  }
  .problem-quote { font-size: clamp(20px, 2.5vw, 28px); font-weight: 700; color: white; line-height: 1.3; letter-spacing: -0.5px; margin-bottom: 16px; font-family: 'Space Grotesk', sans-serif; }
  .problem-quote em { color: var(--cyan); font-style: normal; }

  /* DIFFERENTIAL */
  .diff-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
  .diff-card {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px;
    position: relative; overflow: hidden; cursor: default;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(10,37,64,0.04);
  }
  .diff-card::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    opacity: 0; transition: opacity 0.3s;
    border-radius: var(--radius);
  }
  .diff-card:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(10,37,64,0.12); }
  .diff-card:hover::before { opacity: 0.04; }
  .diff-card:hover .diff-num { color: var(--purple); }
  .diff-card > * { position: relative; z-index: 1; }
  .diff-num { font-size: 48px; font-weight: 900; color: rgba(10,37,64,0.06); font-family: 'Space Grotesk', sans-serif; line-height: 1; margin-bottom: 16px; letter-spacing: -2px; transition: color 0.3s; }
  .diff-card h3 { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; letter-spacing: -0.3px; }
  .diff-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .diff-bar { height: 3px; background: linear-gradient(90deg, var(--cyan), var(--purple)); border-radius: 2px; margin-bottom: 20px; width: 40px; }

  /* METHODOLOGY */
  .methodology-section { background: linear-gradient(180deg, #f0f4ff 0%, var(--bg) 100%); }
  .method-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
  .method-col { background: white; padding: 40px 32px; position: relative; }
  .method-col:hover { background: #fafbff; }
  .method-phase {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 20px; padding: 5px 12px; border-radius: 50px; display: inline-block;
  }
  .method-phase.before { background: rgba(255,183,77,0.15); color: #e07b00; }
  .method-phase.during { background: rgba(0,194,255,0.12); color: #0099cc; }
  .method-phase.after { background: rgba(108,99,255,0.12); color: var(--purple); }
  .method-col h3 { font-size: 22px; font-weight: 700; color: var(--navy); margin-bottom: 16px; letter-spacing: -0.5px; font-family: 'Space Grotesk', sans-serif; }
  .method-items { display: flex; flex-direction: column; gap: 14px; }
  .method-item { display: flex; align-items: flex-start; gap: 12px; }
  .method-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .method-dot.before { background: #e07b00; }
  .method-dot.during { background: var(--cyan); }
  .method-dot.after { background: var(--purple); }
  .method-item-text { font-size: 15px; color: var(--text-muted); font-weight: 500; line-height: 1.4; }

  /* LEARN */
  .learn-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .learn-card {
    background: white; border: 1px solid var(--border);
    border-radius: var(--radius); padding: 30px;
    transition: all 0.3s; cursor: default;
    box-shadow: 0 2px 8px rgba(10,37,64,0.04);
  }
  .learn-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(10,37,64,0.1); border-color: rgba(108,99,255,0.2); }
  .learn-icon {
    width: 52px; height: 52px; border-radius: 14px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .learn-card h3 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; letter-spacing: -0.3px; }
  .learn-card p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
  .learn-card .learn-tag { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }

  /* BEFORE / AFTER */
  .ba-section { background: var(--navy); }
  .ba-section h2 { color: white; }
  .ba-section .section-sub { color: rgba(255,255,255,0.55); }
  .ba-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 32px; align-items: stretch; }
  .ba-col {
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px; padding: 32px; display: flex; flex-direction: column; gap: 16px;
  }
  .ba-col.after { border-color: rgba(0,194,255,0.3); background: rgba(0,194,255,0.06); }
  .ba-col-header { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .ba-col.before .ba-col-header { color: rgba(255,255,255,0.4); }
  .ba-col.after .ba-col-header { color: var(--cyan); }
  .ba-item { display: flex; align-items: flex-start; gap: 14px; }
  .ba-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .ba-item-text h4 { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .ba-col.before .ba-item-text h4 { color: rgba(255,255,255,0.6); }
  .ba-col.after .ba-item-text h4 { color: white; }
  .ba-col.before .ba-item-text p { color: rgba(255,255,255,0.3); font-size: 13px; }
  .ba-col.after .ba-item-text p { color: rgba(255,255,255,0.55); font-size: 13px; }
  .ba-divider { display: flex; align-items: center; justify-content: center; }
  .ba-arrow {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,194,255,0.3);
  }

  /* EXPERIENCE */
  .experience-section { background: linear-gradient(180deg, #f0f4ff 0%, var(--bg) 100%); }
  .timeline { display: flex; gap: 0; align-items: flex-start; position: relative; }
  .timeline::before { content: ''; position: absolute; top: 24px; left: 24px; right: 24px; height: 2px; background: linear-gradient(90deg, var(--cyan), var(--purple)); opacity: 0.3; }
  .timeline-item { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; padding: 0 12px; }
  .timeline-dot {
    width: 48px; height: 48px; border-radius: 50%; margin-bottom: 20px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 4px 15px rgba(108,99,255,0.3);
    position: relative; z-index: 1;
  }
  .timeline-time { font-size: 12px; font-weight: 700; color: var(--cyan); letter-spacing: 0.5px; margin-bottom: 6px; }
  .timeline-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
  .timeline-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }

  /* PRICING */
  .pricing-section { background: var(--bg); }
  .pricing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 740px; margin: 0 auto; }
  .price-card {
    background: white; border: 1px solid var(--border);
    border-radius: 20px; padding: 36px 32px;
    position: relative; overflow: hidden;
    box-shadow: 0 2px 12px rgba(10,37,64,0.04);
    transition: all 0.3s;
  }
  .price-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(10,37,64,0.1); }
  .price-card.featured { background: var(--navy); border-color: transparent; padding-top: 52px; }
  .price-card.featured::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at top, rgba(0,194,255,0.15) 0%, transparent 60%); }
  .price-card > * { position: relative; z-index: 1; }
  .price-tag-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; }
  .price-card.featured .price-tag-label { color: var(--cyan); }

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

}/*EDITMODE-END*/;

const CITIES = ["Medellín", "Bogotá", "Cali", "Barranquilla"];
const CITY_SEATS = { "Medellín": { total: 40, used: 34 }, "Bogotá": { total: 40, used: 31 }, "Cali": { total: 30, used: 22 }, "Barranquilla": { total: 30, used: 19 } };

function useScrollSpy() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 60);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return scrolled;
}

function useFadeIn() {
  useEffect(() => {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    return () => observer.disconnect();
  }, []);
}

function Toast({ msg, show }) {
  return (
    <div className={`toast ${show ? 'show' : ''}`}>
      <span className="toast-icon">✓</span>
      {msg}
    </div>
  );
}

function Nav({ scrolled, activeCity, setActiveCity }) {

function TypingEffect({ text }) {
  const [displayed, setDisplayed] = useState('');
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (idx < text.length) {
      const t = setTimeout(() => { setDisplayed(text.slice(0, idx+1)); setIdx(idx+1); }, 35);
      return () => clearTimeout(t);
    }
  }, [idx, text]);
  return <span>{displayed}<span className="cursor" /></span>;
}

function Hero({ activeCity, setActiveCity, onAction }) {

  const remaining = seats.total - seats.used;

  return (

      <div className="hero-grid" />
      <div className="hero-content">

            <div className="hero-actions">
              <button className="btn-primary" onClick={() => onAction('¡Cupo reservado! Te contactaremos pronto.')}>Reservar cupo →</button>

              </div>
            </div>
          </div>
        </div>

    </section>
  );

function Quoter({ onAction }) {
  const [form, setForm] = useState({ empresa: '', nit: '', ciudad: 'Medellín', personas: '5', email: '' });
  const [showEmail, setShowEmail] = useState(false);
  const [emailSent, setEmailSent] = useState(false);
  const personas = parseInt(form.personas) || 0;
  const precioBase = 1150000;
  const descuento = personas >= 5 ? 0.10 : 0;
  const total = personas * precioBase;
  const totalFinal = total * (1 - descuento);

  const fmt = (n) => n.toLocaleString('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 });

  function handleDownloadPDF() {
    const html = generatePDF(form, personas, total, totalFinal, descuento, fmt);
    const win = window.open('', '_blank');

    if (!form.email) { setShowEmail(true); return; }

function App() {
  const [activeCity, setActiveCity] = useState(localStorage.getItem('i365_city') || 'Medellín');
  const [toast, setToast] = useState({ show: false, msg: '' });
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const scrolled = useScrollSpy();
  useFadeIn();

  useEffect(() => { localStorage.setItem('i365_city', activeCity); }, [activeCity]);

  function showToast(msg) {
    setToast({ show: true, msg });
    setTimeout(() => setToast({ show: false, msg: '' }), 3000);
  }

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  function handleTweaks(t) {
    setTweaks(t);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: t }, '*');
  }

  return (
    <>
      <Nav scrolled={scrolled} activeCity={activeCity} setActiveCity={setActiveCity} />
      <Hero activeCity={activeCity} setActiveCity={setActiveCity} onAction={showToast} />
      <Problem />
      <Differential />
      <Methodology />
      <Learn />
      <BeforeAfter />
      <Experience />
      <Pricing onAction={showToast} />
      <Quoter onAction={showToast} />
      <Resources />
      <Purpose />
      <FinalCTA onAction={showToast} />
      <Footer />
      <Toast msg={toast.msg} show={toast.show} />
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweaks={handleTweaks} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
